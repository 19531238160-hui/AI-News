name: Daily AI News

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/daily-ai-news.yml
      - .github/automation-trigger.txt
  schedule:
    - cron: "17 11 * * *"
    - cron: "47 11 * * *"
    - cron: "17 12 * * *"
    - cron: "45 12 * * *"
    - cron: "15 13 * * *"
    - cron: "45 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Check today's email marker
        id: email_marker
        run: |
          report_date="$(TZ=Asia/Shanghai date +%F)"
          marker_path="reports/.email-sent-${report_date}"
          echo "date=${report_date}" >> "$GITHUB_OUTPUT"
          echo "path=${marker_path}" >> "$GITHUB_OUTPUT"
          if [ -f "$marker_path" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Email marker already exists: $marker_path"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Email marker not found: $marker_path"
          fi

      - name: Generate and email daily report
        if: github.event_name == 'workflow_dispatch' || steps.email_marker.outputs.exists != 'true'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_STYLE: ${{ secrets.AI_API_STYLE || 'responses' }}
          MAIL_HOST: ${{ secrets.MAIL_HOST || 'smtp.163.com' }}
          MAIL_PORT: ${{ secrets.MAIL_PORT || '465' }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          NEWS_API_PROVIDER: ${{ secrets.NEWS_API_PROVIDER }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python -m ai_news.main

      - name: Mark email sent
        if: github.event_name == 'workflow_dispatch' || steps.email_marker.outputs.exists != 'true'
        run: |
          touch "${{ steps.email_marker.outputs.path }}"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if compgen -G "reports/*.md" > /dev/null || compgen -G "reports/.email-sent-*" > /dev/null; then
            git add reports
          else
            echo "No report or email marker files found."
          fi
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: add AI news report for $(date -u +%F)"
            git fetch origin main:refs/remotes/origin/main
            git rebase origin/main
            git push origin HEAD:main
          fi
