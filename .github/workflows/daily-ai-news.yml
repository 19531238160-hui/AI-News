name: Daily AI News

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Generate and email daily report
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_STYLE: ${{ secrets.AI_API_STYLE || 'responses' }}
          MAIL_HOST: ${{ secrets.MAIL_HOST || 'smtp.163.com' }}
          MAIL_PORT: ${{ secrets.MAIL_PORT || '465' }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          NEWS_API_PROVIDER: ${{ secrets.NEWS_API_PROVIDER }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python -m ai_news.main

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if compgen -G "reports/*.md" > /dev/null; then
            git add reports/*.md
          else
            echo "No report files found."
          fi
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: add AI news report for $(date -u +%F)"
            git fetch origin main:refs/remotes/origin/main
            git rebase origin/main
            git push origin HEAD:main
          fi
